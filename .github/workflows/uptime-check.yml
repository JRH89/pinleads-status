name: Uptime Check

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  uptime-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Run uptime check
        run: |
          curl -X GET "${{ secrets.STATUS_URL }}/api/test-check"
        env:
          STATUS_URL: ${{ secrets.STATUS_URL }}
